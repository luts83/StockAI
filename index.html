<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#090c10">
<title>StockAI — Chart Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --bg:      #090c10;
  --surface: #0d1117;
  --card:    #13181f;
  --card2:   #1a2030;
  --border:  #1e2530;
  --border2: #2a3444;
  --text:    #e2eaf5;
  --muted:   #7a8a9e;
  --dim:     #4a5568;
  --blue:    #4d9fff;
  --green:   #34d399;
  --red:     #f87171;
  --yellow:  #fbbf24;
  --orange:  #fb923c;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; overflow-x: hidden; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }
.logo-icon { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg,#1a4a8a,#2d7dd2); display:flex; align-items:center; justify-content:center; font-size:14px; }
.live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--green); background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.2); padding:3px 10px 3px 8px; border-radius:20px; font-family:'JetBrains Mono',monospace; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* HERO */
.hero { padding:52px 24px 40px; text-align:center; background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(77,159,255,0.06),transparent); border-bottom:1px solid var(--border); }
.hero h1 { font-size:32px; font-weight:800; letter-spacing:-0.8px; margin-bottom:6px; }
.hero h1 span { color:var(--blue); }
.hero p { font-size:13px; color:var(--muted); margin-bottom:28px; }

/* SEARCH — 데스크탑 레이아웃 (Grace가 좋아하는 버전) */
.search-wrap { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
.search-row {
  display:flex; align-items:center;
  background:var(--card); border:1px solid var(--border2);
  border-radius:12px; overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
  min-height: 52px;
}
.search-row:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(77,159,255,0.12); }
#ticker-input {
  flex:1; min-width:0; padding:14px 20px;
  background:none; border:none; outline:none;
  font-family:'JetBrains Mono',monospace;
  font-size:15px; font-weight:500; color:var(--text);
  letter-spacing:1.5px; text-transform:uppercase;
}
#ticker-input::placeholder { color:var(--dim); text-transform:none; letter-spacing:0; font-weight:400; }
.period-group { display:flex; align-items:center; gap:2px; padding:6px 8px; border-left:1px solid var(--border); flex-shrink:0; }
.period-btn {
  padding:7px 10px; font-size:11px; border-radius:6px;
  background:none; border:none; color:var(--muted);
  cursor:pointer; transition:all 0.15s;
  font-family:'JetBrains Mono',monospace; font-weight:500;
  min-height:36px; min-width:36px;
}
.period-btn:hover { background:var(--border2); color:var(--text); }
.period-btn.active { background:rgba(77,159,255,0.15); color:var(--blue); }
.search-btn {
  flex-shrink:0; margin:6px; padding:0 20px;
  background:var(--blue); border:none; border-radius:8px;
  color:#fff; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
  transition:background 0.2s; white-space:nowrap;
  height:40px; min-width:76px;
}
.search-btn:hover { background:#62aaff; }
.search-btn:active { background:#3a8cee; }
.search-btn:disabled { opacity:0.4; cursor:not-allowed; }

.quick-row { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
.q-chip {
  padding:6px 14px; font-size:12px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:20px; color:var(--muted); cursor:pointer;
  font-family:'JetBrains Mono',monospace; font-weight:500;
  transition:all 0.15s; min-height:32px; display:flex; align-items:center;
}
.q-chip:hover, .q-chip:active { border-color:var(--blue); color:var(--blue); background:rgba(77,159,255,0.06); }

/* MAIN */
.main { max-width:1280px; margin:0 auto; padding:28px 24px 60px; }

/* LOADING */
#loading { display:none; text-align:center; padding:80px 20px; }
.spinner { width:44px; height:44px; margin:0 auto 24px; border-radius:50%; border:2px solid var(--border2); border-top-color:var(--blue); animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-ticker { font-size:30px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--blue); margin-bottom:6px; }
#loading-status { font-size:13px; color:var(--muted); }
.loading-steps { display:flex; gap:8px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
.step-pill { font-size:11px; padding:4px 12px; border-radius:20px; font-family:'JetBrains Mono',monospace; border:1px solid var(--border2); color:var(--dim); transition:all 0.3s; }
.step-pill.active { border-color:var(--blue); color:var(--blue); background:rgba(77,159,255,0.08); }
.step-pill.done { border-color:var(--green); color:var(--green); background:rgba(52,211,153,0.08); }

/* ERROR */
#error-msg { display:none; margin:32px auto; max-width:440px; background:rgba(248,113,113,0.06); border:1px solid rgba(248,113,113,0.25); border-radius:12px; padding:24px; text-align:center; color:var(--red); font-size:14px; }

/* RESULTS */
#results { display:none; }

/* TICKER HEADER */
.ticker-header { display:flex; flex-wrap:wrap; align-items:flex-start; gap:20px; margin-bottom:20px; background:var(--card); border:1px solid var(--border2); border-radius:14px; padding:22px 26px; }
.th-left { flex:1; min-width:180px; }
.th-ticker { font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom:4px; }
.th-price { font-size:44px; font-weight:700; letter-spacing:-1.5px; font-family:'JetBrains Mono',monospace; line-height:1; margin-bottom:10px; }
.th-badges { display:flex; gap:8px; flex-wrap:wrap; }
.badge { font-size:12px; padding:4px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-weight:600; }
.badge-up   { background:rgba(52,211,153,0.12); color:var(--green); }
.badge-dn   { background:rgba(248,113,113,0.12); color:var(--red); }
.badge-gray { background:var(--border); color:var(--muted); }
.badge-blue { background:rgba(77,159,255,0.12); color:var(--blue); }

/* INDICATOR STRIP */
.ind-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:12px; overflow:hidden; flex:2; min-width:280px; }
.ind-cell { background:var(--card); padding:16px 18px; display:flex; flex-direction:column; gap:3px; }
.ind-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
.ind-val { font-size:20px; font-weight:600; font-family:'JetBrains Mono',monospace; line-height:1.2; }
.ind-sub { font-size:11px; font-family:'JetBrains Mono',monospace; }
.c-green{color:var(--green)} .c-red{color:var(--red)} .c-blue{color:var(--blue)} .c-yellow{color:var(--yellow)} .c-muted{color:var(--muted)}

/* CHART */
.chart-wrap { background:var(--card); border:1px solid var(--border2); border-radius:14px; overflow:hidden; margin-bottom:20px; }
.chart-topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--border); }
.chart-label { font-size:12px; color:var(--muted); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
.chart-pills { display:flex; gap:6px; flex-wrap:wrap; }
.chart-pill { font-size:11px; padding:3px 8px; border-radius:5px; background:var(--border); color:var(--muted); font-family:'JetBrains Mono',monospace; }
.chart-wrap img { width:100%; display:block; }

/* TWO COL → 모바일에서 탭으로 */
.two-col { display:grid; grid-template-columns:3fr 2fr; gap:20px; }

/* PANEL */
.panel { background:var(--card); border:1px solid var(--border2); border-radius:14px; overflow:hidden; }
.panel-head { display:flex; align-items:center; gap:8px; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--card2); }
.panel-icon { font-size:14px; }
.panel-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--muted); }
.panel-body { padding:20px; }

/* TAB BAR — 모바일 전용, 기본 숨김 */
.tab-bar { display:none; }
.tab-btn {
  flex:1; padding:13px 8px; font-size:12px; font-weight:700;
  background:none; border:none; color:var(--muted); cursor:pointer;
  transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px;
  border-bottom:2px solid transparent;
}
.tab-btn.active { color:var(--blue); border-bottom-color:var(--blue); background:rgba(77,159,255,0.04); }

/* SIGNAL BOX */
.signal-box { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:10px; margin-bottom:20px; border:1px solid; }
.signal-box.buy   { background:rgba(52,211,153,0.06); border-color:rgba(52,211,153,0.25); }
.signal-box.watch { background:rgba(251,191,36,0.06);  border-color:rgba(251,191,36,0.25); }
.signal-box.warn  { background:rgba(248,113,113,0.06); border-color:rgba(248,113,113,0.25); }
.signal-icon { font-size:22px; flex-shrink:0; }
.signal-text { font-size:14px; font-weight:700; }
.signal-sub  { font-size:12px; color:var(--muted); margin-top:2px; }

/* ANALYSIS MARKDOWN */
.analysis-md { font-size:13.5px; line-height:1.8; color:#c8d8e8; }
.analysis-md h1 { font-size:15px; font-weight:700; color:var(--text); margin:0 0 16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.analysis-md h2 { font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.8px; margin:22px 0 10px; display:flex; align-items:center; gap:8px; }
.analysis-md h2::after { content:''; flex:1; height:1px; background:var(--border); }
.analysis-md h3 { font-size:13px; font-weight:600; color:var(--yellow); margin:14px 0 6px; }
.analysis-md p { margin-bottom:10px; }
.analysis-md ul { padding-left:16px; margin-bottom:10px; }
.analysis-md li { margin-bottom:5px; }
.analysis-md li::marker { color:var(--blue); }
.analysis-md strong { color:var(--text); font-weight:600; }
.analysis-md code { font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--border2); color:var(--blue); padding:1px 6px; border-radius:4px; }
.analysis-md blockquote { border-left:3px solid var(--blue); padding:8px 14px; background:rgba(77,159,255,0.05); border-radius:0 6px 6px 0; margin:10px 0; color:var(--muted); font-size:13px; }
.analysis-md table { width:100%; border-collapse:collapse; font-size:12px; margin:12px 0; font-family:'JetBrains Mono',monospace; }
.analysis-md th { background:var(--border2); color:var(--muted); font-weight:600; text-align:left; padding:8px 12px; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
.analysis-md td { padding:8px 12px; border-top:1px solid var(--border); vertical-align:top; }
.analysis-md tr:hover td { background:rgba(255,255,255,0.02); }
.analysis-md hr { border:none; border-top:1px solid var(--border); margin:16px 0; }

/* NEWS */
.news-item { border-bottom:1px solid var(--border); }
.news-item:last-child { border-bottom:none; }
.news-item-header { display:flex; gap:12px; padding:14px 0; cursor:pointer; user-select:none; -webkit-user-select:none; }
.news-item-header:hover .news-title-ko { color:var(--blue); }
.news-num { font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--dim); flex-shrink:0; margin-top:2px; min-width:18px; }
.news-body { flex:1; min-width:0; }
.news-meta { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.news-src { font-size:10px; color:var(--blue); font-family:'JetBrains Mono',monospace; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.news-date { font-size:10px; color:var(--dim); font-family:'JetBrains Mono',monospace; }
.news-title-ko { font-size:13.5px; color:var(--text); line-height:1.45; font-weight:600; transition:color 0.15s; }
.news-title-en { font-size:11px; color:var(--dim); margin-top:3px; line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; }
.news-chevron { flex-shrink:0; width:20px; height:20px; display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:11px; transition:transform 0.2s; margin-top:2px; }
.news-item.open .news-chevron { transform:rotate(180deg); color:var(--blue); }
.news-drawer { display:none; margin:0 0 14px 30px; padding:14px 16px; background:rgba(77,159,255,0.04); border:1px solid var(--border2); border-radius:10px; }
.news-item.open .news-drawer { display:block; }
.news-drawer-content { font-size:13px; line-height:1.8; color:#b8cce0; min-height:32px; }
.news-drawer-content strong { color:var(--text); font-weight:600; }
.news-drawer-content em { color:var(--yellow); font-style:normal; font-weight:600; }
.news-drawer-content p { margin-bottom:8px; }
.news-drawer-content ul { padding-left:16px; margin-bottom:8px; }
.news-drawer-content li { margin-bottom:4px; }
.news-drawer-content li::marker { color:var(--blue); }
.news-drawer-actions { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); flex-wrap:wrap; }
.drawer-link { font-size:11px; color:var(--muted); text-decoration:none; font-family:'JetBrains Mono',monospace; padding:4px 10px; border-radius:5px; border:1px solid var(--border2); transition:all 0.15s; }
.drawer-link:hover { color:var(--blue); border-color:var(--blue); }
.drawer-streaming { display:flex; align-items:center; gap:6px; color:var(--blue); font-size:11px; font-family:'JetBrains Mono',monospace; }
.stream-dot { width:5px; height:5px; border-radius:50%; background:var(--blue); animation:blink 0.8s infinite; }
.sentiment-badge { font-size:11px; padding:3px 9px; border-radius:5px; font-family:'JetBrains Mono',monospace; font-weight:600; }
.sent-pos { background:rgba(52,211,153,0.1); color:var(--green); }
.sent-neg { background:rgba(248,113,113,0.1); color:var(--red); }
.sent-neu { background:rgba(77,159,255,0.1); color:var(--blue); }

/* DISCLAIMER */
.disclaimer { text-align:center; padding:28px 20px 0; font-size:11px; color:var(--dim); border-top:1px solid var(--border); margin-top:32px; }

/* ── 모바일 조정 (≤600px) ── */
@media (max-width: 600px) {
  header { padding: 0 16px; }
  .live-badge span { display: none; }  /* LIVE DATA → dot만 */

  .hero { padding: 28px 16px 24px; }
  .hero h1 { font-size: 24px; }
  .hero p { font-size: 12px; margin-bottom: 20px; }

  /* 검색창: 입력+버튼 한 줄, period는 아래 줄 */
  .search-wrap { gap: 8px; }
  .search-row { flex-wrap: wrap; border-radius: 12px; }
  #ticker-input { padding: 13px 14px; font-size: 14px; letter-spacing: 0.5px; order: 1; }
  .period-group {
    order: 3; width: 100%;
    border-left: none; border-top: 1px solid var(--border);
    padding: 8px 10px; justify-content: space-around;
  }
  .period-btn { flex: 1; text-align: center; font-size: 12px; padding: 8px 4px; }
  .search-btn { order: 2; margin: 6px 6px 6px 0; padding: 0 16px; font-size: 13px; }

  .quick-row { justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .quick-row::-webkit-scrollbar { display: none; }
  .q-chip { flex-shrink: 0; }

  .main { padding: 14px 14px 60px; }

  /* 가격 헤더: 세로 스택 */
  .ticker-header { flex-direction: column; gap: 14px; padding: 16px; margin-bottom: 14px; }
  .th-left { min-width: unset; }
  .th-price { font-size: 36px; letter-spacing: -1px; }
  .ind-strip { min-width: unset; grid-template-columns: 1fr 1fr; }
  .ind-cell { padding: 12px 14px; }
  .ind-val { font-size: 18px; }

  /* 차트 topbar pills 숨김 */
  .chart-pills { display: none; }
  .chart-topbar { padding: 10px 14px; }
  .chart-wrap { margin-bottom: 14px; }

  /* 분석/뉴스: 탭으로 전환 */
  .tab-bar {
    display: flex;
    background: var(--card); border: 1px solid var(--border2);
    border-radius: 14px 14px 0 0; border-bottom: none;
    overflow: hidden;
  }
  .two-col { grid-template-columns: 1fr; gap: 0; }
  .two-col .panel { border-radius: 0 0 14px 14px; border-top: none; display: none; }

  .two-col .panel.tab-active { display: block !important; }
  .panel-head { display: none; }  /* 모바일에서 패널 헤더 숨김 (탭이 대신) */
  .panel-body { padding: 16px; }

  .signal-box { padding: 12px 14px; }
  .analysis-md { font-size: 13px; }
  .analysis-md table { display: block; overflow-x: auto; }

  .news-drawer { margin: 0 0 12px 26px; padding: 12px 14px; }
  .news-drawer-content { font-size: 12px; }

  .disclaimer { padding: 20px 16px 0; margin-top: 20px; }
}

@media (max-width: 380px) {
  .hero h1 { font-size: 20px; }
  .th-price { font-size: 30px; }
  .ind-val { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📈</div>
    StockAI
  </div>
  <div class="live-badge"><div class="live-dot"></div><span>LIVE DATA</span></div>
</header>

<div class="hero">
  <h1>주식 <span>차트 분석</span>, 자동화</h1>
  <p>티커 입력 → AI가 차트 + 지표 + 실시간 뉴스를 종합 분석</p>
  <div class="search-wrap">
    <div class="search-row">
      <input id="ticker-input" type="text" placeholder="AAPL, TSLA, MDB, 005930.KS ..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="period-group">
        <button class="period-btn" data-p="1mo">1M</button>
        <button class="period-btn" data-p="3mo">3M</button>
        <button class="period-btn active" data-p="6mo">6M</button>
        <button class="period-btn" data-p="1y">1Y</button>
      </div>
      <button class="search-btn" id="analyze-btn" onclick="runAnalysis()">분석 →</button>
    </div>
    <div class="quick-row">
      <span class="q-chip" onclick="setTicker('AAPL')">AAPL</span>
      <span class="q-chip" onclick="setTicker('TSLA')">TSLA</span>
      <span class="q-chip" onclick="setTicker('NVDA')">NVDA</span>
      <span class="q-chip" onclick="setTicker('MDB')">MDB</span>
      <span class="q-chip" onclick="setTicker('AMZN')">AMZN</span>
      <span class="q-chip" onclick="setTicker('META')">META</span>
      <span class="q-chip" onclick="setTicker('005930.KS')">삼성전자</span>
      <span class="q-chip" onclick="setTicker('035420.KS')">NAVER</span>
    </div>
  </div>
</div>

<div class="main">
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-ticker"></div>
    <div id="loading-status">분석 준비 중...</div>
    <div class="loading-steps">
      <div class="step-pill" id="step0">데이터 수집</div>
      <div class="step-pill" id="step1">지표 계산</div>
      <div class="step-pill" id="step2">차트 생성</div>
      <div class="step-pill" id="step3">뉴스 수집</div>
      <div class="step-pill" id="step4">AI 분석</div>
    </div>
  </div>

  <div id="error-msg"></div>

  <div id="results">
    <div class="ticker-header">
      <div class="th-left">
        <div class="th-ticker" id="res-ticker"></div>
        <div class="th-price" id="res-price"></div>
        <div class="th-badges">
          <span class="badge" id="res-change"></span>
          <span class="badge badge-gray" id="res-ma-status"></span>
          <span class="badge badge-blue" id="res-vol-status"></span>
        </div>
      </div>
      <div class="ind-strip" id="res-indicators"></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-topbar">
        <span class="chart-label">Technical Chart</span>
        <div class="chart-pills">
          <span class="chart-pill">캔들스틱</span>
          <span class="chart-pill">MA 20/60/200</span>
          <span class="chart-pill">볼린저밴드</span>
          <span class="chart-pill">RSI · MACD · Stoch</span>
          <span class="chart-pill">Volume</span>
        </div>
      </div>
      <img id="res-chart" src="" alt="chart">
    </div>

    <!-- 모바일 탭 바 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(0, this)">🤖 AI 분석</button>
      <button class="tab-btn" onclick="switchTab(1, this)">📰 뉴스</button>
    </div>

    <div class="two-col">
      <div class="panel tab-active" id="panel-0">
        <div class="panel-head">
          <span class="panel-icon">🤖</span>
          <span class="panel-title">AI 분석 리포트</span>
        </div>
        <div class="panel-body">
          <div id="signal-area"></div>
          <div class="analysis-md" id="res-analysis"></div>
        </div>
      </div>
      <div class="panel" id="panel-1">
        <div class="panel-head">
          <span class="panel-icon">📰</span>
          <span class="panel-title">실시간 뉴스</span>
        </div>
        <div class="panel-body">
          <div id="res-news"></div>
        </div>
      </div>
    </div>

    <div class="disclaimer">이 분석은 참고용이며, 투자 결정과 손실에 대한 책임은 본인에게 있습니다.</div>
  </div>
</div>

<script>
const API = window.location.origin;
let period = "6mo";

if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });

// 탭 전환 (모바일)
function switchTab(idx, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".two-col .panel").forEach((p, i) => {
    p.classList.toggle("tab-active", i === idx);
  });
}

document.querySelectorAll(".period-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    period = btn.dataset.p;
  });
});
document.getElementById("ticker-input").addEventListener("keydown", e => { if(e.key==="Enter") runAnalysis(); });
function setTicker(t) { document.getElementById("ticker-input").value = t; runAnalysis(); }

const stepLabels = ["데이터 수집","지표 계산","차트 생성","뉴스 수집","AI 분석"];
let stepIdx=0, stepTimer=null;

function advanceStep() {
  if(stepIdx>0) { const prev=document.getElementById(`step${stepIdx-1}`); if(prev) prev.className="step-pill done"; }
  const cur=document.getElementById(`step${stepIdx}`);
  if(cur) { cur.classList.add("active"); document.getElementById("loading-status").textContent=stepLabels[stepIdx]+" 중..."; }
  stepIdx++;
}

async function runAnalysis() {
  const ticker = document.getElementById("ticker-input").value.trim().toUpperCase();
  if(!ticker) return;
  document.getElementById("results").style.display = "none";
  document.getElementById("error-msg").style.display = "none";
  document.getElementById("loading").style.display = "block";
  document.getElementById("loading-ticker").textContent = ticker;
  document.getElementById("analyze-btn").disabled = true;
  document.querySelectorAll(".step-pill").forEach(p => p.className="step-pill");
  stepIdx=0; advanceStep();
  stepTimer = setInterval(advanceStep, 1600);

  try {
    const res = await fetch(`${API}/analyze`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ ticker, period, interval:"1d" })
    });
    if(!res.ok) { const e=await res.json(); throw new Error(e.detail||"분석 실패"); }
    const data = await res.json();
    clearInterval(stepTimer);
    document.querySelectorAll(".step-pill").forEach(p => p.className="step-pill done");
    setTimeout(() => renderResults(data), 200);
  } catch(err) {
    clearInterval(stepTimer);
    document.getElementById("loading").style.display = "none";
    document.getElementById("error-msg").innerHTML =
      `<strong>오류 발생</strong><br>${err.message}<br><small style="color:var(--dim);margin-top:8px;display:block">API 서버(localhost:8000)가 실행 중인지 확인하세요</small>`;
    document.getElementById("error-msg").style.display = "block";
  } finally {
    document.getElementById("analyze-btn").disabled = false;
  }
}

function renderResults(data) {
  document.getElementById("loading").style.display = "none";
  const inds = data.indicators;

  document.getElementById("res-ticker").textContent = data.ticker + "  ·  1D  ·  " + new Date().toLocaleDateString("ko-KR");
  document.getElementById("res-price").textContent = "$" + data.current_price.toLocaleString();

  const chEl = document.getElementById("res-change");
  const up = data.change_pct >= 0;
  chEl.textContent = (up?"▲ +":"▼ ") + data.change_pct + "%";
  chEl.className = "badge " + (up?"badge-up":"badge-dn");
  document.getElementById("res-ma-status").textContent = data.current_price > inds.ma200 ? "▲ MA200 위" : "▼ MA200 아래";
  document.getElementById("res-vol-status").textContent = "MA20  $" + inds.ma20.toLocaleString();

  const rsi=inds.rsi, rsiC=rsi>70?"c-red":rsi<30?"c-green":"c-muted";
  const rsiLbl=rsi>70?"과매수":rsi<30?"과매도":"중립";
  const macdBull=inds.macd>inds.macd_signal;
  const ma60val=inds.ma60??inds.ma200;

  document.getElementById("res-indicators").innerHTML = `
    <div class="ind-cell">
      <div class="ind-lbl">RSI (14)</div>
      <div class="ind-val ${rsiC}">${rsi}</div>
      <div class="ind-sub ${rsiC}">${rsiLbl}</div>
    </div>
    <div class="ind-cell">
      <div class="ind-lbl">MACD</div>
      <div class="ind-val ${macdBull?"c-green":"c-red"}">${inds.macd}</div>
      <div class="ind-sub ${macdBull?"c-green":"c-red"}">${macdBull?"▲ 골든크로스":"▼ 데드크로스"}</div>
    </div>
    <div class="ind-cell">
      <div class="ind-lbl">MA 60</div>
      <div class="ind-val c-blue">$${Number(ma60val).toLocaleString()}</div>
      <div class="ind-sub c-muted">${data.current_price>(ma60val||0)?"▲ 위":"▼ 아래"}</div>
    </div>
    <div class="ind-cell">
      <div class="ind-lbl">MA 200</div>
      <div class="ind-val c-yellow">$${inds.ma200.toLocaleString()}</div>
      <div class="ind-sub c-muted">${data.current_price>inds.ma200?"▲ 위":"▼ 아래"}</div>
    </div>`;

  document.getElementById("res-chart").src = "data:image/png;base64," + data.chart_image;

  const analysis = data.analysis || "";
  let signal="watch", sigIcon="👀", sigText="관망 구간", sigSub="추가 신호 확인 필요";
  if(/매수\s*검토|강세|골든|상승 전환|반등/i.test(analysis)) { signal="buy"; sigIcon="🟢"; sigText="매수 검토 구간"; sigSub="기술적 반등 신호 감지"; }
  else if(/주의|하락|약세|데드크로스|매도/i.test(analysis)) { signal="warn"; sigIcon="🔴"; sigText="주의 구간"; sigSub="하락 추세 지속 가능성"; }
  document.getElementById("signal-area").innerHTML = `
    <div class="signal-box ${signal}">
      <div class="signal-icon">${sigIcon}</div>
      <div><div class="signal-text">${sigText}</div><div class="signal-sub">${sigSub}</div></div>
    </div>`;

  document.getElementById("res-analysis").innerHTML =
    typeof marked !== 'undefined' ? marked.parse(analysis) : analysis.replace(/\n/g,"<br>");

  // 모바일 탭 AI분석으로 리셋
  document.querySelectorAll(".tab-btn").forEach((b,i) => b.classList.toggle("active", i===0));
  document.querySelectorAll(".two-col .panel").forEach((p,i) => p.classList.toggle("tab-active", i===0));

  currentTicker = data.ticker;
  newsData = data.news || [];
  renderNews(newsData);

  document.getElementById("results").style.display = "block";
  document.getElementById("results").scrollIntoView({ behavior:"smooth", block:"start" });
}

// ── News ──
let currentTicker = "", newsData = [];
const summaryCache = {};

function renderNews(items) {
  const el = document.getElementById("res-news");
  if(!items.length) { el.innerHTML="<p style='color:var(--dim);font-size:13px;padding:8px 0'>뉴스를 불러올 수 없습니다.</p>"; return; }
  el.innerHTML = items.slice(0,8).map((n,i) => {
    let dateStr="";
    try { if(n.published) dateStr=new Date(n.published).toLocaleDateString("ko-KR",{month:"short",day:"numeric"}); } catch(e){}
    const titleKo = n.title_ko || n.title;
    const titleEn = n.title_ko ? n.title : "";
    return `<div class="news-item" id="news-${i}">
      <div class="news-item-header" onclick="toggleNews(${i})">
        <div class="news-num">${String(i+1).padStart(2,"0")}</div>
        <div class="news-body">
          <div class="news-meta">
            <span class="news-src">${n.source||"News"}</span>
            ${dateStr?`<span class="news-date">${dateStr}</span>`:""}
          </div>
          <div class="news-title-ko">${titleKo}</div>
          ${titleEn?`<div class="news-title-en">${titleEn}</div>`:""}
        </div>
        <div class="news-chevron">▼</div>
      </div>
      <div class="news-drawer" id="drawer-${i}">
        <div class="news-drawer-content" id="drawer-content-${i}">
          <span style="color:var(--dim);font-size:12px">탭하면 AI 번역 요약이 로드됩니다</span>
        </div>
        <div class="news-drawer-actions" id="drawer-actions-${i}" style="display:none">
          ${n.url?`<a class="drawer-link" href="${n.url}" target="_blank">원문 보기 →</a>`:""}
        </div>
      </div>
    </div>`;
  }).join("");
}

async function toggleNews(idx) {
  const item = document.getElementById(`news-${idx}`);
  const isOpen = item.classList.contains("open");
  document.querySelectorAll(".news-item.open").forEach(el => el.classList.remove("open"));
  if(isOpen) return;
  item.classList.add("open");

  const n = newsData[idx];
  const cacheKey = n.url||n.title;
  if(summaryCache[cacheKey]) { renderSummary(idx, summaryCache[cacheKey]); return; }

  const contentEl = document.getElementById(`drawer-content-${idx}`);
  const actionsEl = document.getElementById(`drawer-actions-${idx}`);
  contentEl.innerHTML = `<div class="drawer-streaming"><div class="stream-dot"></div>AI 번역 요약 중...</div>`;
  actionsEl.style.display = "none";

  try {
    const res = await fetch(`${API}/news/summary`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ title:n.title, summary:n.summary||"", url:n.url||"", source:n.source||"", ticker:currentTicker })
    });
    if(!res.ok) throw new Error("요약 실패");
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    contentEl.innerHTML = "";
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      fullText += decoder.decode(value, {stream:true});
      contentEl.innerHTML = typeof marked!=="undefined" ? marked.parse(fullText) : fullText.replace(/\n/g,"<br>");
    }
    summaryCache[cacheKey] = fullText;
    actionsEl.style.display = "flex";
    const sentEl = document.createElement("span");
    if(/긍정|상승|매수|호재/i.test(fullText)) { sentEl.className="sentiment-badge sent-pos"; sentEl.textContent="🟢 긍정적"; }
    else if(/부정|하락|매도|악재|리스크/i.test(fullText)) { sentEl.className="sentiment-badge sent-neg"; sentEl.textContent="🔴 부정적"; }
    else { sentEl.className="sentiment-badge sent-neu"; sentEl.textContent="⚪ 중립"; }
    actionsEl.prepend(sentEl);
  } catch(err) {
    contentEl.innerHTML = `<span style="color:var(--red);font-size:12px">오류: ${err.message}</span>`;
  }
}

function renderSummary(idx, text) {
  document.getElementById(`drawer-content-${idx}`).innerHTML = typeof marked!=="undefined" ? marked.parse(text) : text.replace(/\n/g,"<br>");
  document.getElementById(`drawer-actions-${idx}`).style.display = "flex";
}
</script>
</body>
</html>
